[workspace]
members = [
    "apps/desktop/src-tauri",
    "crates/irodori-error",
    "crates/irodori-jobs",
    "crates/irodori-core",
    "crates/irodori-proxy",
    "crates/irodori-secure-store",
    "crates/irodori-completion",
    "crates/irodori-extension",
    "crates/irodori-io",
    "crates/irodori-server",
    "crates/irodori-knowledge",
]
default-members = [
    "crates/irodori-error",
    "crates/irodori-jobs",
    "crates/irodori-core",
    "crates/irodori-proxy",
    "crates/irodori-secure-store",
    "crates/irodori-completion",
    "crates/irodori-extension",
    "crates/irodori-io",
    "crates/irodori-server",
    "crates/irodori-knowledge",
]
resolver = "2"

[workspace.package]
version = "0.2.23"
edition = "2021"
license = "MIT OR 0BSD"
authors = ["Irodori Table contributors"]

[workspace.dependencies]
irodori-sql = { git = "https://github.com/hjosugi/irodori-sql", tag = "v0.2.23" }
