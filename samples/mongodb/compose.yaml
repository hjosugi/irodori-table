name: irodori-mongodb
# MongoDB is a DOCUMENT store, not SQL. Irodori connects through the `mongodb`
# crate behind the same `Connection` trait; a "query" is a collection name (or a
# JSON {collection, filter}) and documents project to a table.
# Irodori URL: mongodb://irodori:irodori@localhost:57017/samples?authSource=admin
services:
  mongodb:
    image: docker.io/library/mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: irodori
      MONGO_INITDB_ROOT_PASSWORD: irodori
    ports:
      - "57017:27017"
    volumes:
      - ./01_samples.js:/docker-entrypoint-initdb.d/01_samples.js:ro
