name: irodori-mariadb
# Irodori URL: mysql://irodori:irodori@localhost:55307/samples  (MySQL wire)
# Reuses the MySQL sample schema in ../mysql/01_samples.sql.
services:
  mariadb:
    image: docker.io/library/mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: irodori
      MARIADB_PASSWORD: irodori
      MARIADB_DATABASE: samples
    ports:
      - "55307:3306"
    volumes:
      - ../mysql/01_samples.sql:/docker-entrypoint-initdb.d/01_samples.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 3s
      timeout: 3s
      retries: 40
