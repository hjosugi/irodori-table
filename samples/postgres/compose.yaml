name: irodori-postgres
# Irodori URL: postgres://irodori:irodori@localhost:55432/samples
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: irodori
      POSTGRES_PASSWORD: irodori
      POSTGRES_DB: samples
    ports:
      - "55432:5432"
    volumes:
      - ./01_samples.sql:/docker-entrypoint-initdb.d/01_samples.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irodori -d samples"]
      interval: 3s
      timeout: 3s
      retries: 30
