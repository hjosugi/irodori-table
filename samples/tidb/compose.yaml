name: irodori-tidb
# Irodori URL: mysql://root@localhost:54000/test  (MySQL wire)
# Standalone tidb-server with the embedded `unistore` engine (no PD/TiKV cluster).
services:
  tidb:
    image: docker.io/pingcap/tidb:latest
    command: ["--store=unistore", "--host=0.0.0.0", "--status-host=0.0.0.0"]
    ports:
      - "54000:4000"    # MySQL protocol
      - "54010:10080"   # status (optional)
