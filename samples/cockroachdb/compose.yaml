name: irodori-cockroachdb
# Irodori URL: postgres://root@localhost:55257/defaultdb?sslmode=disable  (Postgres wire)
# Insecure single node has no auth/seed — the connect check uses `select 1`.
services:
  cockroachdb:
    image: docker.io/cockroachdb/cockroach:latest
    command: ["start-single-node", "--insecure"]
    ports:
      - "55257:26257"   # SQL (postgres wire)
      - "55180:8080"    # admin UI (optional)
