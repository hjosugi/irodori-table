name: irodori-timescaledb
# Irodori URL: postgres://irodori:irodori@localhost:55433/samples  (Postgres wire)
# Reuses the Postgres sample schema in ../postgres/01_samples.sql.
services:
  timescaledb:
    image: docker.io/timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: irodori
      POSTGRES_PASSWORD: irodori
      POSTGRES_DB: samples
    ports:
      - "55433:5432"
    volumes:
      - ../postgres/01_samples.sql:/docker-entrypoint-initdb.d/01_samples.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irodori -d samples"]
      interval: 3s
      timeout: 3s
      retries: 30
