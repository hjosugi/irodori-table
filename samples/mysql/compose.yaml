name: irodori-mysql
# Irodori URL: mysql://irodori:irodori@localhost:55306/samples
services:
  mysql:
    image: docker.io/library/mysql:8.4
    command: ["--local-infile=1"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: irodori
      MYSQL_PASSWORD: irodori
      MYSQL_DATABASE: samples
    ports:
      - "55306:3306"
    volumes:
      - ./01_samples.sql:/docker-entrypoint-initdb.d/01_samples.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uirodori", "-pirodori"]
      interval: 3s
      timeout: 3s
      retries: 40
