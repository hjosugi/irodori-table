version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: deps
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/desktop
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Tokyo
    commit-message:
      prefix: deps
    groups:
      desktop-npm:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: deps
    groups:
      rust:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: Asia/Tokyo
    commit-message:
      prefix: deps
    groups:
      desktop-tauri-rust:
        patterns:
          - "*"
