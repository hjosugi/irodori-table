name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-foundation:
    name: Rust foundation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check Rust crate licenses
        shell: bash
        run: scripts/check-licenses.sh

      - name: Build Rust workspace scaffold
        run: cargo build

  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npm test

