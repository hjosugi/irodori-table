name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formatting:
    name: Formatting checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out irodori-table
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check desktop formatting
        run: make desktop-format-check

  preflight:
    name: Tooling preflight
    runs-on: ubuntu-latest

    steps:
      - name: Check out irodori-table
        uses: actions/checkout@v7

      - name: Check out irodori-kit
        uses: actions/checkout@v7
        with:
          repository: hjosugi/irodori-kit
          path: irodori-kit

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            irodori-kit/packages/extension-sdk/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install extension SDK dependencies
        working-directory: irodori-kit/packages/extension-sdk
        run: npm ci

      - name: Check local kit patch is not committed
        run: make kit-patch-check

      - name: Lint desktop sources
        run: make desktop-lint

      - name: Check Rust crate licenses
        shell: bash
        run: scripts/check-licenses.sh

      - name: Check data-source support inventory
        run: node tools/docs/support-status.mjs --check

      - name: Validate extension manifests
        env:
          EXTENSION_SDK_DIR: irodori-kit/packages/extension-sdk
        run: make extension-manifests

  desktop-typegen:
    name: Desktop generated bindings
    needs:
      - formatting
      - preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # The committed .cargo/config.toml links Linux builds with mold, and the
      # desktop crate needs WebKit/GTK headers when typegen compiles it.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: typegen-${{ runner.os }}

      - name: Check generated TypeScript bindings
        run: node apps/desktop/tools/typegen.mjs --check

  rust-foundation:
    name: Rust foundation (${{ matrix.os }})
    needs:
      - formatting
      - preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0

      # The committed .cargo/config.toml links Linux builds with mold, and the
      # desktop crate needs WebKit/GTK headers on Linux.
      - name: Install Rust/Linux build dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      # Reuse compiled dependencies across runs instead of rebuilding the whole
      # tree every time. Keep this aligned with .cargo/config.toml.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: ${{ matrix.os }}

      - name: Run Rust workspace tests
        run: cargo test --workspace

  desktop-frontend-checks:
    name: Desktop frontend checks
    needs: formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npm test

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm run build

  desktop-browser:
    name: Desktop browser tests
    needs:
      - formatting
      - preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: npx playwright install --with-deps chromium

      - name: Run browser component tests
        working-directory: apps/desktop
        run: npm run test:browser

      - name: Run desktop e2e tests
        working-directory: apps/desktop
        run: npm run test:e2e
