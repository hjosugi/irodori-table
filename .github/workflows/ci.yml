name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: GitHub Actions lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out irodori-table
        uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflow files
        run: actionlint

  formatting:
    name: Formatting checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out irodori-table
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check desktop formatting
        run: make desktop-format-check

  preflight:
    name: Tooling preflight
    runs-on: ubuntu-latest

    steps:
      - name: Check out irodori-table
        uses: actions/checkout@v7

      - name: Check out irodori-kit
        uses: actions/checkout@v7
        with:
          repository: hjosugi/irodori-kit
          path: irodori-kit

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            irodori-kit/packages/extension-sdk/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install extension SDK dependencies
        working-directory: irodori-kit/packages/extension-sdk
        run: npm ci

      - name: Check local kit patch is not committed
        run: make kit-patch-check

      - name: Lint desktop sources
        run: make desktop-lint

      - name: Check Rust crate licenses
        shell: bash
        run: scripts/check-licenses.sh

      - name: Check data-source support inventory
        run: node tools/docs/support-status.mjs --check

      - name: Validate extension manifests
        env:
          EXTENSION_SDK_DIR: irodori-kit/packages/extension-sdk
        run: make extension-manifests

  dependency-policy:
    name: Cargo dependency policy
    runs-on: ubuntu-latest

    steps:
      - name: Check out irodori-table
        uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo-deny
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-deny
          key: cargo-deny-0.19.9-${{ runner.os }}

      - name: Install cargo-deny
        run: command -v cargo-deny || cargo install cargo-deny --locked --version 0.19.9

      - name: Check Rust dependency policy
        run: make cargo-deny

  desktop-typegen:
    name: Desktop generated bindings
    needs:
      - formatting
      - preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      # The committed .cargo/config.toml links Linux builds with mold, and the
      # desktop crate needs WebKit/GTK headers when typegen compiles it.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          # shared-key (not key) replaces the per-job segment, so every job on
          # this OS shares one dependency cache instead of each keeping its own
          # ~1.1GB copy of the same build. Three copies put the repo over its
          # 10GB quota, which LRU-evicted the release caches.
          shared-key: rust-${{ runner.os }}

      - name: Check generated TypeScript bindings
        run: node apps/desktop/tools/typegen.mjs --check

  rust-foundation:
    name: Rust foundation (${{ matrix.os }})
    needs:
      - formatting
      - preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy

      # The committed .cargo/config.toml links Linux builds with mold, and the
      # desktop crate needs WebKit/GTK headers on Linux.
      - name: Install Rust/Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      # Reuse compiled dependencies across runs instead of rebuilding the whole
      # tree every time. Keep this aligned with .cargo/config.toml.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          shared-key: rust-${{ runner.os }}

      - name: Run Rust clippy
        run: make rust-clippy

      - name: Run Rust workspace tests
        run: cargo test --workspace

  db-integration:
    name: DB integration (postgres/mysql)
    needs:
      - formatting
      - preflight
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: irodori
          POSTGRES_PASSWORD: irodori
          POSTGRES_DB: samples
        ports:
          - "55432:5432"
        options: >-
          --health-cmd "pg_isready -U irodori -d samples"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: irodori
          MYSQL_PASSWORD: irodori
          MYSQL_DATABASE: samples
        ports:
          - "55306:3306"
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uirodori -pirodori"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 18
          --health-start-period 30s

    steps:
      - name: Check out irodori-table
        uses: actions/checkout@v7

      - name: Check out sample fixtures
        uses: actions/checkout@v7
        with:
          repository: hjosugi/irodori-samples
          path: irodori-samples

      - uses: dtolnay/rust-toolchain@1.96.0

      # The desktop crate needs WebKit/GTK headers when compiling the
      # integration-test binary on Linux.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          shared-key: rust-${{ runner.os }}

      - name: Seed Postgres sample database
        shell: bash
        run: docker exec -i "${{ job.services.postgres.id }}" psql -U irodori -d samples < irodori-samples/postgres/01_samples.sql

      - name: Seed MySQL sample database
        shell: bash
        run: docker exec -i "${{ job.services.mysql.id }}" mysql -uirodori -pirodori samples < irodori-samples/mysql/01_samples.sql

      - name: Run Postgres integration test
        env:
          IRODORI_PG_URL: postgres://irodori:irodori@127.0.0.1:55432/samples
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test integration_db postgres_samples -- --nocapture

      - name: Run MySQL integration test
        env:
          IRODORI_MYSQL_URL: mysql://irodori:irodori@localhost:55306/samples
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test integration_db mysql_samples -- --nocapture

  desktop-frontend-checks:
    name: Desktop frontend checks
    needs: formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npm test

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm run build

  desktop-browser:
    name: Desktop browser tests
    needs:
      - formatting
      - preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: npx playwright install --with-deps chromium

      - name: Run browser component tests
        working-directory: apps/desktop
        run: npm run test:browser

      - name: Run desktop e2e tests
        working-directory: apps/desktop
        run: npm run test:e2e
