name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-foundation:
    name: Rust foundation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v7

      # typeship is a sibling path dependency (see ../../../../typeship in the
      # desktop crate's Cargo.toml). actions/checkout refuses paths outside
      # $GITHUB_WORKSPACE, so check it out inside the workspace and move it
      # alongside the repo where Cargo expects it.
      - name: Checkout typeship
        uses: actions/checkout@v7
        with:
          repository: hjosugi/typeship
          path: _typeship
      - name: Position typeship as a sibling
        shell: bash
        run: mv "$GITHUB_WORKSPACE/_typeship" "$GITHUB_WORKSPACE/../typeship"

      - uses: dtolnay/rust-toolchain@stable

      # The committed .cargo/config.toml links Linux builds with mold, and the
      # desktop crate needs WebKit/GTK headers on Linux.
      - name: Install Rust/Linux build dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      # Reuse compiled dependencies across runs instead of rebuilding the whole
      # tree every time. Workspace target dir lives at the repo root.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: ${{ matrix.os }}

      - name: Check Rust crate licenses
        shell: bash
        run: scripts/check-licenses.sh

      - name: Check data-source support inventory
        run: node tools/docs/support-status.mjs --check

      - name: Build Rust workspace scaffold
        run: cargo build

      - name: Run Rust workspace tests
        run: cargo test --workspace

      - name: Check generated TypeScript bindings
        run: node apps/desktop/tools/typegen.mjs --check

  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # The desktop npm build runs typegen, which depends on the Rust workspace
      # and the sibling typeship checkout just like the Rust foundation job.
      - name: Checkout typeship
        uses: actions/checkout@v7
        with:
          repository: hjosugi/typeship
          path: _typeship
      - name: Position typeship as a sibling
        shell: bash
        run: mv "$GITHUB_WORKSPACE/_typeship" "$GITHUB_WORKSPACE/../typeship"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust/Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: desktop-frontend-${{ runner.os }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npm test

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: npx playwright install --with-deps chromium

      - name: Run desktop e2e tests
        working-directory: apps/desktop
        run: npm run test:e2e

  web-frontend:
    name: Web frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run web tests
        working-directory: apps/web
        run: npm test

      - name: Build web frontend
        working-directory: apps/web
        run: npm run build
