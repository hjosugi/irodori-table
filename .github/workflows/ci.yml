name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-foundation:
    name: Rust foundation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # The committed .cargo/config.toml links Linux builds with mold, and the
      # desktop crate needs WebKit/GTK headers on Linux.
      - name: Install Rust/Linux build dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      # Reuse compiled dependencies across runs instead of rebuilding the whole
      # tree every time. Keep this aligned with .cargo/config.toml.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: ${{ matrix.os }}

      - name: Check Rust crate licenses
        shell: bash
        run: scripts/check-licenses.sh

      - name: Check data-source support inventory
        run: node tools/docs/support-status.mjs --check

      - name: Build Rust workspace scaffold
        run: cargo build

      - name: Run Rust workspace tests
        run: cargo test --workspace

      - name: Check generated TypeScript bindings
        run: node apps/desktop/tools/typegen.mjs --check

  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust/Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: desktop-frontend-${{ runner.os }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npm test

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: npx playwright install --with-deps chromium

      - name: Run desktop e2e tests
        working-directory: apps/desktop
        run: npm run test:e2e
