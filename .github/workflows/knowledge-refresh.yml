name: Knowledge refresh

# Scheduled "COLLECT" pipeline: once a month, pull ALL enabled official-doc
# sources into the knowledge base, extract facts, (optionally) run the ML
# cheatsheet extractor, regenerate the cheatsheets, and open one consolidated
# PR with a run digest as its body. The knowledge SQLite DB itself is
# gitignored and rebuilt each run; only generated docs land in the PR.
#
# ML extraction is optional. It runs only when the IRODORI_LLM_* secrets are set;
# otherwise tools/knowledge/ml-extract.mjs is a safe no-op and the deterministic
# rule-based facts still feed the generators.

on:
  schedule:
    - cron: "17 6 1 * *" # 1st of each month, 06:17 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: Max sources to fetch this run (empty = all enabled sources)
        default: ""
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: knowledge-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh knowledge and regenerate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Fetch official docs into the knowledge base
        run: |
          limit_arg=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            limit_arg="--limit ${{ github.event.inputs.limit }}"
          fi
          node tools/knowledge/refresh.mjs --report-json "$RUNNER_TEMP/refresh-results.json" $limit_arg

      - name: Extract facts (rule-based, deterministic)
        run: node tools/knowledge/analyze.mjs --changed-only

      - name: ML cheatsheet extraction (optional)
        env:
          IRODORI_LLM_BASE_URL: ${{ secrets.IRODORI_LLM_BASE_URL }}
          IRODORI_LLM_API_KEY: ${{ secrets.IRODORI_LLM_API_KEY }}
          IRODORI_LLM_MODEL: ${{ secrets.IRODORI_LLM_MODEL }}
        # --strict surfaces misconfiguration/model failures in the job result
        # (unset secrets still no-op); incremental skip keeps re-runs cheap.
        run: node tools/knowledge/ml-extract.mjs --all --limit 12 --strict --no-app-provider

      - name: Regenerate cheatsheets
        run: node tools/knowledge/cheatsheet.mjs

      - name: Verify registry guards still pass
        run: node tools/docs/support-status.mjs

      - name: Generate refresh report
        run: node tools/knowledge/refresh-report.mjs --results "$RUNNER_TEMP/refresh-results.json" --out registry/knowledge-refresh-report.md

      - name: Compute run month
        id: run-date
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Open pull request with regenerated docs
        uses: peter-evans/create-pull-request@v8
        with:
          branch: knowledge/auto-refresh
          title: "chore(knowledge): monthly refresh ${{ steps.run-date.outputs.month }}"
          commit-message: "chore(knowledge): monthly refresh ${{ steps.run-date.outputs.month }}"
          body-path: registry/knowledge-refresh-report.md
          add-paths: |
            registry/cheatsheets/**
            registry/knowledge-refresh-report.md
            knowledge/sources.json
