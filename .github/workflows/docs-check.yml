name: Docs check

# Fast, node-only guards for the generated/curated data-source docs. Keeps the
# DbEngine registry, knowledge/engines.json, the support-status inventory, and the
# per-engine cheatsheets and checksum-pinned extension release metadata from drifting apart.
# No Rust build or model is used; release checks read GitHub's public API.

on:
  pull_request:
    paths:
      - apps/desktop/src-tauri/src/db/engine.rs
      - apps/desktop/src-tauri/src/db.rs
      - knowledge/engines.json
      - knowledge/sources.json
      - knowledge/cheatsheets/**
      - registry/data-source-support-status.md
      - registry/cheatsheets/**
      - registry/catalog/**
      - apps/desktop/src/features/extensions/bundled-catalog.json
      - tools/extensions/sync-release-catalog.mjs
      - tools/docs/**
      - tools/knowledge/cheatsheet.mjs
      - .github/workflows/docs-check.yml
  push:
    branches:
      - main

jobs:
  docs-check:
    name: Validate data-source docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # DB sample fixtures + catalog live in the sibling irodori-samples repo.
      - name: Check out sample fixtures
        uses: actions/checkout@v7
        with:
          repository: hjosugi/irodori-samples
          path: irodori-samples

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Support-status registry guard
        run: node tools/docs/support-status.mjs

      - name: Extension release catalog guard
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node tools/extensions/sync-release-catalog.mjs --check
          node tools/docs/build-extension-catalog.mjs --check

      - name: DB feature-sample catalog guard
        run: node tools/docs/db-feature-samples.mjs
        env:
          IRODORI_SAMPLES: ${{ github.workspace }}/irodori-samples

      - name: Cheatsheets up to date
        run: node tools/knowledge/cheatsheet.mjs --check
