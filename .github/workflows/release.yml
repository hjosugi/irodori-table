name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-linux:
    name: Publish lightweight Linux release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry and workspace target dir so external deps
      # don't recompile from scratch every run. Keep this aligned with
      # .cargo/config.toml.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: release-linux

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Verify generated bindings and typecheck frontend
        working-directory: apps/desktop
        run: npm run verify:release

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Irodori Table v__VERSION__'
          releaseBody: 'Lightweight Linux pre-release. Signed macOS, Windows, and updater artifacts are intentionally omitted until release signing secrets are configured.'
          releaseDraft: false
          prerelease: true
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          args: --features legacy-connectors,duckdb
          projectPath: apps/desktop

      - name: Verify Linux AppImage artifact
        working-directory: apps/desktop
        run: npm run release:verify-linux
