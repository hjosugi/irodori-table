name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7

      # typeship is a sibling path dependency (see ../../../../typeship in the
      # desktop crate's Cargo.toml). actions/checkout refuses paths outside
      # $GITHUB_WORKSPACE, so check it out inside the workspace and move it
      # alongside the repo where Cargo expects it.
      - name: Checkout typeship
        uses: actions/checkout@v7
        with:
          repository: hjosugi/typeship
          path: _typeship
      - name: Position typeship as a sibling
        shell: bash
        run: mv "$GITHUB_WORKSPACE/_typeship" "$GITHUB_WORKSPACE/../typeship"

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev mold

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry + ./target so external deps (tauri, sqlx, the
      # cloud DB drivers) don't recompile from scratch every run. A version bump
      # changes Cargo.lock, but rust-cache restores the nearest previous cache as
      # a base, so only our own workspace crates recompile while the heavy
      # third-party deps stay warm.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace target dir lives at the repo root, not under apps/desktop.
          workspaces: '. -> target'
          # Keep separate caches per OS in the build matrix.
          key: ${{ matrix.platform }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build frontend and generate types
        working-directory: apps/desktop
        run: npm run build

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Irodori Table v__VERSION__'
          releaseBody: 'See the asset list below for downloads.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: apps/desktop

      - name: Verify Linux AppImage artifact
        if: matrix.platform == 'ubuntu-latest'
        working-directory: apps/desktop
        run: npm run release:verify-linux
