name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing v* tag to publish'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        default: lightweight
        type: choice
        options:
          - lightweight
          - preview
          - stable
      windows_signing:
        description: 'Windows signing backend (stable, or SignPath preview)'
        required: false
        default: pfx
        type: choice
        options:
          - pfx
          - azure
          - signpath

permissions:
  actions: read
  contents: write

jobs:
  release-gates:
    name: Resolve release channel gates
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.resolve.outputs.channel }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      upload_updater: ${{ steps.resolve.outputs.upload_updater }}
      linux_tauri_args: ${{ steps.resolve.outputs.linux_tauri_args }}
      macos_tauri_args: ${{ steps.resolve.outputs.macos_tauri_args }}
      windows_tauri_args: ${{ steps.resolve.outputs.windows_tauri_args }}
      release_body: ${{ steps.resolve.outputs.release_body }}
      windows_signing: ${{ steps.resolve.outputs.windows_signing }}
      macos_signing: ${{ steps.resolve.outputs.macos_signing }}
      release_id: ${{ steps.create_release.outputs.release_id }}
    env:
      REQUESTED_CHANNEL: ${{ inputs.channel || 'lightweight' }}
      REQUESTED_TAG: ${{ inputs.release_tag || github.ref_name }}
      REQUESTED_WINDOWS_SIGNING: ${{ inputs.windows_signing || 'pfx' }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
      AZURE_TRUSTED_SIGNING_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Check release channel inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          channel="${REQUESTED_CHANNEL}"
          release_tag="${REQUESTED_TAG}"
          windows_signing="${REQUESTED_WINDOWS_SIGNING}"
          # Only the stable channel ever signs macOS; the other channels
          # publish unsigned preview artifacts by design.
          macos_signing=false

          if [[ "${release_tag}" != v* ]]; then
            echo "::error::release_tag must be an existing v* tag; got '${release_tag}'."
            exit 1
          fi

          case "${windows_signing}" in
            pfx|azure|signpath) ;;
            *)
              echo "::error::unknown windows_signing '${windows_signing}'; expected pfx, azure, or signpath."
              exit 1
              ;;
          esac

          case "${channel}" in
            lightweight)
              prerelease=true
              upload_updater=false
              linux_tauri_args="--bundles appimage,deb,rpm"
              macos_tauri_args=""
              windows_tauri_args=""
              ;;
            preview)
              if [[ "${windows_signing}" == "signpath" ]]; then
                required=(
                  SIGNPATH_API_TOKEN
                  SIGNPATH_ORGANIZATION_ID
                  SIGNPATH_PROJECT_SLUG
                  SIGNPATH_SIGNING_POLICY_SLUG
                  SIGNPATH_ARTIFACT_CONFIGURATION_SLUG
                )
                missing=()
                for name in "${required[@]}"; do
                  if [[ -z "${!name:-}" ]]; then
                    missing+=("${name}")
                  fi
                done
                if (( ${#missing[@]} > 0 )); then
                  printf '::error::preview SignPath signing requires missing secret(s): %s\n' "${missing[*]}"
                  exit 1
                fi
              fi
              prerelease=true
              upload_updater=false
              linux_tauri_args=""
              macos_tauri_args="--target universal-apple-darwin --bundles dmg,app"
              windows_tauri_args="--bundles nsis,msi"
              ;;
            stable)
              # Signing is best-effort rather than required: stable is the only
              # channel that publishes as Latest (prerelease=false), so missing
              # signing material must not block the release. Each lane below
              # detects its own secrets and turns itself off when they are
              # absent, so an unsigned stable release still ships the full
              # Linux + macOS + Windows set.

              # The updater is cryptographically bound to the updater keypair:
              # without it there is no key to sign the update manifest with, so
              # the updater lane switches off instead of producing artifacts
              # clients would reject.
              # Presence is not enough: v0.7.39 had both secrets set but the
              # private key was not valid base64, so the release compiled for
              # ten minutes, bundled every package, and only then died in the
              # signing step. Validate the key here, where failing is free.
              # Never echo the value — only whether it decodes.
              updater_key_ok=false
              if [[ -n "${TAURI_UPDATER_PUBLIC_KEY:-}" && -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
                if printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | tr -d '[:space:]' | base64 -d >/dev/null 2>&1; then
                  updater_key_ok=true
                else
                  echo "::warning::TAURI_SIGNING_PRIVATE_KEY is set but is not valid base64, so it cannot sign update manifests. Re-set it to the key contents (not a path to the key file)."
                fi
              fi
              if [[ "${updater_key_ok}" == "true" ]]; then
                upload_updater=true
              else
                upload_updater=false
                echo "::warning::stable updater artifacts omitted: TAURI_UPDATER_PUBLIC_KEY + a base64-decodable TAURI_SIGNING_PRIVATE_KEY are required to sign update manifests."
              fi

              # macOS needs both halves to be useful: the certificate signs the
              # bundle, the notarization credentials clear Gatekeeper. Partial
              # credentials would fail mid-build, so treat them as all-or-nothing.
              if [[ -n "${APPLE_CERTIFICATE:-}" && -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]] \
                && { [[ -n "${APPLE_API_ISSUER:-}" && -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_P8:-}" ]] \
                  || [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; }; then
                macos_signing=true
              else
                macos_signing=false
                echo "::warning::stable macOS artifacts will be unsigned: needs APPLE_CERTIFICATE + APPLE_CERTIFICATE_PASSWORD, plus APPLE_API_ISSUER + APPLE_API_KEY + APPLE_API_KEY_P8 or APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID."
              fi

              # Windows secrets for the chosen signing backend: a PFX certificate
              # imported into the runner, an Azure Trusted Signing service
              # principal + account/profile, or a SignPath (Foundation) cloud
              # signing project. Falling back to 'none' switches off every
              # downstream signing step, which all key off windows_signing.
              case "${windows_signing}" in
                azure)
                  windows_required=(
                    AZURE_TENANT_ID
                    AZURE_CLIENT_ID
                    AZURE_CLIENT_SECRET
                    AZURE_TRUSTED_SIGNING_ENDPOINT
                    AZURE_TRUSTED_SIGNING_ACCOUNT
                    AZURE_TRUSTED_SIGNING_PROFILE
                  )
                  ;;
                signpath)
                  windows_required=(
                    SIGNPATH_API_TOKEN
                    SIGNPATH_ORGANIZATION_ID
                    SIGNPATH_PROJECT_SLUG
                    SIGNPATH_SIGNING_POLICY_SLUG
                    SIGNPATH_ARTIFACT_CONFIGURATION_SLUG
                  )
                  ;;
                *)
                  windows_required=(
                    WINDOWS_CERTIFICATE
                    WINDOWS_CERTIFICATE_PASSWORD
                    WINDOWS_CERTIFICATE_THUMBPRINT
                  )
                  ;;
              esac
              missing=()
              for name in "${windows_required[@]}"; do
                if [[ -z "${!name:-}" ]]; then
                  missing+=("${name}")
                fi
              done
              if (( ${#missing[@]} > 0 )); then
                printf '::warning::stable Windows artifacts will be unsigned (windows_signing=%s); missing secret(s): %s\n' "${windows_signing}" "${missing[*]}"
                windows_signing=none
              fi

              prerelease=false
              if [[ "${upload_updater}" == "true" ]]; then
                updater_args=" --features updater --config src-tauri/tauri.updater.conf.json"
              else
                updater_args=""
              fi
              linux_tauri_args="--bundles appimage,deb,rpm${updater_args}"
              macos_tauri_args="--target universal-apple-darwin --bundles dmg,app${updater_args}"
              windows_tauri_args="--bundles nsis,msi${updater_args}"
              ;;
            *)
              echo "::error::unknown release channel '${channel}'."
              exit 1
              ;;
          esac

          {
            echo "channel=${channel}"
            echo "release_tag=${release_tag}"
            echo "prerelease=${prerelease}"
            echo "upload_updater=${upload_updater}"
            echo "linux_tauri_args=${linux_tauri_args}"
            echo "macos_tauri_args=${macos_tauri_args}"
            echo "windows_tauri_args=${windows_tauri_args}"
            echo "windows_signing=${windows_signing}"
            echo "macos_signing=${macos_signing}"
            echo "release_body<<EOF_RELEASE_BODY"
            if [[ "${channel}" == "stable" ]]; then
              # Describe what actually shipped: signing is best-effort, so the
              # notes must not promise signatures this run could not produce.
              echo "Stable release with Linux, universal macOS, and Windows packages."
              if [[ "${upload_updater}" == "true" ]]; then
                echo "Includes signed Tauri updater artifacts for the stable update channel."
              else
                echo "Updater artifacts are omitted from this release; update in place is unavailable and the app must be reinstalled to upgrade."
              fi
              if [[ "${macos_signing}" == "true" ]]; then
                echo "macOS packages are signed and notarized."
              else
                echo "macOS packages are unsigned and may trigger Gatekeeper trust warnings."
              fi
              if [[ "${windows_signing}" == "none" ]]; then
                echo "Windows installers are unsigned and may trigger SmartScreen warnings."
              else
                echo "Windows installers are signed (${windows_signing})."
              fi
            elif [[ "${channel}" == "preview" && "${windows_signing}" == "signpath" ]]; then
              echo "Unsigned universal macOS preview artifacts and SignPath-signed Windows NSIS/MSI installers added to the existing lightweight Linux pre-release. These artifacts are not part of the stable updater channel; macOS packages may trigger operating-system trust warnings."
            elif [[ "${channel}" == "preview" ]]; then
              echo "Unsigned universal macOS and Windows preview artifacts added to the existing lightweight Linux pre-release. These artifacts are not part of the stable updater channel and may trigger operating-system trust warnings."
            else
              echo "Lightweight Linux pre-release with AppImage, deb, and rpm packages. Built with default features only; updater artifacts and platform signing are intentionally omitted. Use the preview channel to append universal macOS and Windows packages, optionally signing Windows through SignPath. DuckDB is distributed through its installable connector extension."
            fi
            echo "EOF_RELEASE_BODY"
          } >> "${GITHUB_OUTPUT}"

      # Create the release once, here, so the platform lanes can run in
      # parallel and only ever add assets to it. Previously they were chained
      # Linux -> macOS -> Windows purely so they would not race each other
      # creating the same release (tauri-action#914), which cost ~31 minutes of
      # wall clock to avoid a problem that a single up-front create removes.
      - name: Create or reuse the GitHub release
        id: create_release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve.outputs.release_tag }}
          RELEASE_NAME: Irodori Table ${{ steps.resolve.outputs.release_tag }}
          RELEASE_BODY: ${{ steps.resolve.outputs.release_body }}
          PRERELEASE: ${{ steps.resolve.outputs.prerelease }}
          # Only a stable release should claim the Latest badge; prerelease
          # channels must never displace the current stable on the home page.
          MAKE_LATEST: ${{ steps.resolve.outputs.prerelease == 'false' }}
        run: |
          set -euo pipefail
          # Re-dispatching a channel against an existing tag is a supported
          # workflow (lightweight first, then stable), so adopt the existing
          # release rather than failing or duplicating it.
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Reusing existing release ${RELEASE_TAG}"
            gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
              --notes "${RELEASE_BODY}" --prerelease="${PRERELEASE}" \
              --latest="${MAKE_LATEST}"
          else
            echo "Creating release ${RELEASE_TAG}"
            gh release create "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" --notes "${RELEASE_BODY}" \
              --verify-tag --prerelease="${PRERELEASE}" --latest="${MAKE_LATEST}"
          fi
          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq .id)
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

  publish-linux:
    name: Publish Linux packages
    needs: release-gates
    if: needs.release-gates.outputs.linux_tauri_args != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-gates.outputs.release_tag }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      # No npm cache here on purpose. The release bump rewrites the version in
      # package-lock.json, so setup-node's hashFiles() key is new on every
      # release and the cache could never hit — it only wrote ~760MB of dead
      # entries that pushed the repo over its 10GB cache quota and evicted the
      # far more expensive Rust caches. `npm ci` costs 7-29s uncached.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Pinned to match rust-toolchain.toml; see the macOS lane for why.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      # Cache the Cargo registry and workspace target dir so external deps
      # don't recompile from scratch every run. Keep this aligned with
      # .cargo/config.toml.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          shared-key: release-${{ runner.os }}

      - name: Cache AppImage runtime
        uses: actions/cache@v6
        with:
          path: .cache/tauri
          key: appimage-runtime-${{ runner.os }}-${{ runner.arch }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Prepare stable updater signing config
        if: needs.release-gates.outputs.upload_updater == 'true'
        working-directory: apps/desktop
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          IRODORI_UPDATER_ENDPOINT: ${{ vars.IRODORI_UPDATER_ENDPOINT }}
        run: npm run release:prepare-updater

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.release-gates.outputs.upload_updater == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.release-gates.outputs.upload_updater == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          tagName: ${{ needs.release-gates.outputs.release_tag }}
          releaseName: 'Irodori Table ${{ needs.release-gates.outputs.release_tag }}'
          releaseBody: ${{ needs.release-gates.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.release-gates.outputs.prerelease }}
          releaseId: ${{ needs.release-gates.outputs.release_id }}
          # latest.json is assembled once in publish-updater. Letting each lane
          # merge it concurrently loses platforms (tauri-action#1197).
          uploadUpdaterJson: false
          uploadUpdaterSignatures: ${{ needs.release-gates.outputs.upload_updater }}
          # Default is 0; asset uploads to a shared release are worth retrying.
          retryAttempts: 3
          projectPath: apps/desktop
          args: ${{ needs.release-gates.outputs.linux_tauri_args }}

      - name: Verify Linux package artifacts
        working-directory: apps/desktop
        run: npm run release:verify-linux

  publish-macos:
    name: Publish macOS app
    needs: release-gates
    if: needs.release-gates.outputs.macos_tauri_args != ''
    runs-on: macos-15
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-gates.outputs.release_tag }}

      # No npm cache here on purpose. The release bump rewrites the version in
      # package-lock.json, so setup-node's hashFiles() key is new on every
      # release and the cache could never hit — it only wrote ~760MB of dead
      # entries that pushed the repo over its 10GB cache quota and evicted the
      # far more expensive Rust caches. `npm ci` costs 7-29s uncached.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Pinned to match rust-toolchain.toml. With @stable the runner installed
      # a newer toolchain that rust-toolchain.toml then overrode, so the
      # download was discarded — and because rust-cache hashes every installed
      # toolchain into its key, each new Rust stable silently invalidated the
      # release caches.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          shared-key: release-${{ runner.os }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Prepare stable updater signing config
        if: needs.release-gates.outputs.upload_updater == 'true'
        working-directory: apps/desktop
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          IRODORI_UPDATER_ENDPOINT: ${{ vars.IRODORI_UPDATER_ENDPOINT }}
        run: npm run release:prepare-updater

      - name: Prepare macOS signing and notarization
        if: needs.release-gates.outputs.macos_signing == 'true'
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:prepare-macos-signing

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.release-gates.outputs.upload_updater == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.release-gates.outputs.upload_updater == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          APPLE_API_ISSUER: ${{ needs.release-gates.outputs.macos_signing == 'true' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ needs.release-gates.outputs.macos_signing == 'true' && secrets.APPLE_API_KEY || '' }}
          APPLE_ID: ${{ needs.release-gates.outputs.macos_signing == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ needs.release-gates.outputs.macos_signing == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ needs.release-gates.outputs.macos_signing == 'true' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ needs.release-gates.outputs.release_tag }}
          releaseName: 'Irodori Table ${{ needs.release-gates.outputs.release_tag }}'
          releaseBody: ${{ needs.release-gates.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.release-gates.outputs.prerelease }}
          releaseId: ${{ needs.release-gates.outputs.release_id }}
          # latest.json is assembled once in publish-updater. Letting each lane
          # merge it concurrently loses platforms (tauri-action#1197).
          uploadUpdaterJson: false
          uploadUpdaterSignatures: ${{ needs.release-gates.outputs.upload_updater }}
          # Default is 0; asset uploads to a shared release are worth retrying.
          retryAttempts: 3
          projectPath: apps/desktop
          args: ${{ needs.release-gates.outputs.macos_tauri_args }}

  publish-windows:
    name: Publish Windows app
    needs: release-gates
    if: needs.release-gates.outputs.windows_tauri_args != ''
    runs-on: windows-latest
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-gates.outputs.release_tag }}

      # No npm cache here on purpose. The release bump rewrites the version in
      # package-lock.json, so setup-node's hashFiles() key is new on every
      # release and the cache could never hit — it only wrote ~760MB of dead
      # entries that pushed the repo over its 10GB cache quota and evicted the
      # far more expensive Rust caches. `npm ci` costs 7-29s uncached.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Pinned to match rust-toolchain.toml; see the macOS lane for why.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          shared-key: release-${{ runner.os }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Prepare stable updater signing config
        if: needs.release-gates.outputs.upload_updater == 'true'
        working-directory: apps/desktop
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          IRODORI_UPDATER_ENDPOINT: ${{ vars.IRODORI_UPDATER_ENDPOINT }}
        run: npm run release:prepare-updater

      - name: Prepare Windows signing (PFX certificate)
        if: needs.release-gates.outputs.channel == 'stable' && needs.release-gates.outputs.windows_signing == 'pfx'
        working-directory: apps/desktop
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_DIGEST_ALGORITHM: ${{ secrets.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: npm run release:prepare-windows-signing

      # Azure Trusted Signing path: install the signing CLI Tauri will invoke
      # per artifact, then write the signCommand config. Credentials stay in the
      # build step's env; this step only records the non-secret endpoint.
      - name: Install Azure Trusted Signing CLI
        if: needs.release-gates.outputs.channel == 'stable' && needs.release-gates.outputs.windows_signing == 'azure'
        run: cargo install trusted-signing-cli --locked

      - name: Prepare Windows signing (Azure Trusted Signing)
        if: needs.release-gates.outputs.channel == 'stable' && needs.release-gates.outputs.windows_signing == 'azure'
        working-directory: apps/desktop
        env:
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
        run: npm run release:prepare-windows-azure-signing

      - name: Build and Publish Tauri App
        id: publish-tauri-windows
        uses: tauri-apps/tauri-action@v1
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.release-gates.outputs.upload_updater == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.release-gates.outputs.upload_updater == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          # Azure Trusted Signing credentials, read by trusted-signing-cli when
          # Tauri runs the generated signCommand. Empty unless the stable Azure
          # backend is selected, so other channels never see them.
          AZURE_TENANT_ID: ${{ (needs.release-gates.outputs.channel == 'stable' && needs.release-gates.outputs.windows_signing == 'azure') && secrets.AZURE_TENANT_ID || '' }}
          AZURE_CLIENT_ID: ${{ (needs.release-gates.outputs.channel == 'stable' && needs.release-gates.outputs.windows_signing == 'azure') && secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ (needs.release-gates.outputs.channel == 'stable' && needs.release-gates.outputs.windows_signing == 'azure') && secrets.AZURE_CLIENT_SECRET || '' }}
        with:
          tagName: ${{ needs.release-gates.outputs.release_tag }}
          releaseName: 'Irodori Table ${{ needs.release-gates.outputs.release_tag }}'
          releaseBody: ${{ needs.release-gates.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.release-gates.outputs.prerelease }}
          releaseId: ${{ needs.release-gates.outputs.release_id }}
          # latest.json is assembled once in publish-updater. Letting each lane
          # merge it concurrently loses platforms (tauri-action#1197).
          uploadUpdaterJson: false
          uploadUpdaterSignatures: ${{ needs.release-gates.outputs.upload_updater }}
          # Default is 0; asset uploads to a shared release are worth retrying.
          retryAttempts: 3
          projectPath: apps/desktop
          args: ${{ needs.release-gates.outputs.windows_tauri_args }}

      # SignPath (Foundation) is a cloud signing service, not a local signtool.
      # For a SignPath preview or stable release, download the unsigned assets
      # that tauri-action published, submit the same files as a workflow
      # artifact, then replace them only after Authenticode verification.
      # The stable auto-updater payload is built before this post-build signing
      # step; use pfx or azure when it must also be code-signed.
      - name: Download unsigned Windows installers (SignPath)
        if: needs.release-gates.outputs.windows_signing == 'signpath' && (needs.release-gates.outputs.channel == 'preview' || needs.release-gates.outputs.channel == 'stable')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gates.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p signpath/unsigned
          gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
            --dir signpath/unsigned --pattern '*.exe' --pattern '*.msi'
          shopt -s nullglob
          installers=(signpath/unsigned/*.exe signpath/unsigned/*.msi)
          if (( ${#installers[@]} != 2 )); then
            echo "::error::expected one NSIS installer and one MSI package; found ${#installers[@]}."
            exit 1
          fi

      - name: Stage unsigned installers as a workflow artifact (SignPath)
        id: signpath-unsigned
        if: needs.release-gates.outputs.windows_signing == 'signpath' && (needs.release-gates.outputs.channel == 'preview' || needs.release-gates.outputs.channel == 'stable')
        uses: actions/upload-artifact@v7
        with:
          name: irodori-windows-unsigned-${{ needs.release-gates.outputs.release_tag }}
          path: signpath/unsigned/*
          if-no-files-found: error
          retention-days: 1

      - name: Sign Windows installers with SignPath
        if: needs.release-gates.outputs.windows_signing == 'signpath' && (needs.release-gates.outputs.channel == 'preview' || needs.release-gates.outputs.channel == 'stable')
        uses: SignPath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd # v2.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.signpath-unsigned.outputs.artifact-id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: signpath/signed

      - name: Verify and publish signed Windows installers (SignPath)
        if: needs.release-gates.outputs.windows_signing == 'signpath' && (needs.release-gates.outputs.channel == 'preview' || needs.release-gates.outputs.channel == 'stable')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gates.outputs.release_tag }}
        run: |
          $signed = @(Get-ChildItem 'signpath/signed' -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' })
          if ($signed.Count -ne 2) {
            throw "Expected exactly two signed Windows installers; found $($signed.Count)."
          }

          foreach ($installer in $signed) {
            $signature = Get-AuthenticodeSignature $installer.FullName
            if ($signature.Status -ne 'Valid') {
              throw "SignPath returned an invalid signature for $($installer.Name): $($signature.Status)."
            }
            & gh release upload $env:RELEASE_TAG $installer.FullName --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to replace release asset $($installer.Name)."
            }
          }

          $download = Join-Path $env:RUNNER_TEMP 'signed-release-assets'
          New-Item -ItemType Directory -Path $download -Force | Out-Null
          & gh release download $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --pattern '*.exe' --pattern '*.msi' --dir $download
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to download signed Windows release assets.'
          }
          $published = @(Get-ChildItem $download -File)
          if ($published.Count -ne 2) {
            throw "Expected exactly two published Windows installers; found $($published.Count)."
          }
          foreach ($installer in $published) {
            $signature = Get-AuthenticodeSignature $installer.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Published release asset has an invalid signature: $($installer.Name) ($($signature.Status))."
            }
          }

      - name: Remove unsigned Windows assets after a SignPath failure
        if: failure() && steps.publish-tauri-windows.outcome == 'success' && needs.release-gates.outputs.windows_signing == 'signpath' && (needs.release-gates.outputs.channel == 'preview' || needs.release-gates.outputs.channel == 'stable')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gates.outputs.release_tag }}
        run: |
          $version = (Get-Content (Join-Path $env:GITHUB_WORKSPACE 'apps/desktop/package.json') -Raw | ConvertFrom-Json).version
          $assets = @(
            "Irodori.Table_${version}_x64-setup.exe",
            "Irodori.Table_${version}_x64_en-US.msi"
          )
          foreach ($asset in $assets) {
            & gh release delete-asset $env:RELEASE_TAG $asset --repo $env:GITHUB_REPOSITORY --yes
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Release asset $asset was not present or could not be removed."
            }
          }

  publish-updater:
    name: Publish and verify updater manifest
    needs:
      - release-gates
      - publish-linux
      - publish-macos
      - publish-windows
    # The manifest must describe every platform, so require all three lanes.
    # Skipped lanes (a channel that does not build them) also fail this guard,
    # which is correct: a partial manifest would strand those users on an
    # update check that never resolves.
    if: |
      needs.release-gates.outputs.upload_updater == 'true'
      && needs.publish-linux.result == 'success'
      && needs.publish-macos.result == 'success'
      && needs.publish-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      # Deliberately NOT the release tag. The platform lanes build the tagged
      # source, but this job only needs the manifest tool, which ships with the
      # workflow — checking out the tag broke v0.7.39, whose tag predates the
      # tool. Default checkout tracks the ref the workflow was launched from,
      # so the tool always matches the workflow definition running it.
      - name: Checkout irodori-table
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Built here, once, from the signatures the lanes uploaded. tauri-action
      # merges latest.json non-atomically, so three parallel lanes writing it
      # can silently drop a platform (tauri-action#1197).
      - name: Build updater manifest
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gates.outputs.release_tag }}
        run: node tools/build-updater-manifest.mjs "${RUNNER_TEMP}/latest.json"

      - name: Publish updater manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gates.outputs.release_tag }}
        run: |
          gh release upload "${RELEASE_TAG}" "${RUNNER_TEMP}/latest.json" \
            --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Verify published manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gates.outputs.release_tag }}
        run: |
          set -euo pipefail
          # Re-download rather than checking the local copy, so this asserts
          # what clients will actually fetch.
          gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
            --pattern latest.json --dir "${RUNNER_TEMP}/verify"
          manifest="${RUNNER_TEMP}/verify/latest.json"
          test "$(jq -r .version "${manifest}")" = "${RELEASE_TAG#v}"
          # The url check compares two counts rooted at the document. Piping the
          # filtered array into `length == (.platforms | length)` would evaluate
          # .platforms against that array and error out, which is why this never
          # caught anything before.
          jq -e '
            (.platforms | keys | any(startswith("linux-"))) and
            (.platforms | keys | any(startswith("darwin-"))) and
            (.platforms | keys | any(startswith("windows-"))) and
            (([.platforms[] | select((.signature | type == "string") and (.signature | length > 0))] | length) >= 3) and
            (([.platforms[] | select(.url | startswith("https://"))] | length) == (.platforms | length))
          ' "${manifest}"
