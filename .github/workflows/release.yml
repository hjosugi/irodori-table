name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing v* tag to publish'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        default: lightweight
        type: choice
        options:
          - lightweight
          - preview
          - stable

permissions:
  contents: write

jobs:
  release-gates:
    name: Resolve release channel gates
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.resolve.outputs.channel }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      upload_updater: ${{ steps.resolve.outputs.upload_updater }}
      tauri_args: ${{ steps.resolve.outputs.tauri_args }}
      release_body: ${{ steps.resolve.outputs.release_body }}
    env:
      REQUESTED_CHANNEL: ${{ inputs.channel || 'lightweight' }}
      REQUESTED_TAG: ${{ inputs.release_tag || github.ref_name }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Check release channel inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          channel="${REQUESTED_CHANNEL}"
          release_tag="${REQUESTED_TAG}"

          if [[ "${release_tag}" != v* ]]; then
            echo "::error::release_tag must be an existing v* tag; got '${release_tag}'."
            exit 1
          fi

          case "${channel}" in
            lightweight)
              prerelease=true
              upload_updater=false
              tauri_args="--bundles appimage"
              ;;
            preview)
              prerelease=true
              upload_updater=false
              tauri_args=""
              ;;
            stable)
              missing=()
              for name in \
                TAURI_UPDATER_PUBLIC_KEY \
                TAURI_SIGNING_PRIVATE_KEY \
                WINDOWS_CERTIFICATE \
                WINDOWS_CERTIFICATE_PASSWORD \
                WINDOWS_CERTIFICATE_THUMBPRINT \
                APPLE_CERTIFICATE \
                APPLE_CERTIFICATE_PASSWORD
              do
                if [[ -z "${!name:-}" ]]; then
                  missing+=("${name}")
                fi
              done
              if (( ${#missing[@]} > 0 )); then
                printf '::error::stable releases require missing secret(s): %s\n' "${missing[*]}"
                exit 1
              fi
              if [[ ! ( -n "${APPLE_API_ISSUER:-}" && -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_P8:-}" ) && ! ( -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ) ]]; then
                echo "::error::stable macOS notarization requires APPLE_API_ISSUER + APPLE_API_KEY + APPLE_API_KEY_P8 or APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID."
                exit 1
              fi
              prerelease=false
              upload_updater=true
              tauri_args="--bundles appimage --config src-tauri/tauri.updater.conf.json"
              ;;
            *)
              echo "::error::unknown release channel '${channel}'."
              exit 1
              ;;
          esac

          {
            echo "channel=${channel}"
            echo "release_tag=${release_tag}"
            echo "prerelease=${prerelease}"
            echo "upload_updater=${upload_updater}"
            echo "tauri_args=${tauri_args}"
            echo "release_body<<EOF_RELEASE_BODY"
            if [[ "${channel}" == "stable" ]]; then
              echo "Stable release with signed Tauri updater artifacts for the stable update channel, plus signed Windows and signed/notarized macOS artifacts."
            elif [[ "${channel}" == "preview" ]]; then
              echo "Unsigned macOS and Windows preview artifacts added to the existing lightweight Linux pre-release. These artifacts are not part of the stable updater channel and may trigger operating-system trust warnings."
            else
              echo "Lightweight Linux AppImage pre-release. Built with default features only; signed macOS, Windows, updater artifacts, legacy connector bundles, deb, and rpm packages are intentionally omitted until the full release lane is restored. DuckDB is distributed through its installable connector extension."
            fi
            echo "EOF_RELEASE_BODY"
          } >> "${GITHUB_OUTPUT}"

  publish-linux:
    name: Publish Linux AppImage
    needs: release-gates
    if: needs.release-gates.outputs.channel != 'preview'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-gates.outputs.release_tag }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mold \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry and workspace target dir so external deps
      # don't recompile from scratch every run. Keep this aligned with
      # .cargo/config.toml.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: release-linux

      - name: Cache AppImage runtime
        uses: actions/cache@v6
        with:
          path: .cache/tauri
          key: appimage-runtime-${{ runner.os }}-${{ runner.arch }}

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Prepare stable updater signing config
        if: needs.release-gates.outputs.channel == 'stable'
        working-directory: apps/desktop
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          IRODORI_UPDATER_ENDPOINT: ${{ vars.IRODORI_UPDATER_ENDPOINT }}
        run: npm run release:prepare-updater

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.release-gates.outputs.release_tag }}
          releaseName: 'Irodori Table ${{ needs.release-gates.outputs.release_tag }}'
          releaseBody: ${{ needs.release-gates.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.release-gates.outputs.prerelease }}
          uploadUpdaterJson: ${{ needs.release-gates.outputs.upload_updater }}
          uploadUpdaterSignatures: ${{ needs.release-gates.outputs.upload_updater }}
          projectPath: apps/desktop
          args: ${{ needs.release-gates.outputs.tauri_args }}

      - name: Verify Linux AppImage artifact
        working-directory: apps/desktop
        run: npm run release:verify-linux

  publish-macos:
    name: Publish macOS app
    needs:
      - release-gates
      - publish-linux
    if: always() && needs.release-gates.result == 'success' && (needs.release-gates.outputs.channel == 'preview' || (needs.release-gates.outputs.channel == 'stable' && needs.publish-linux.result == 'success'))
    runs-on: macos-latest
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-gates.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Ensure universal macOS Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: release-macos

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Prepare stable updater signing config
        if: needs.release-gates.outputs.channel == 'stable'
        working-directory: apps/desktop
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          IRODORI_UPDATER_ENDPOINT: ${{ vars.IRODORI_UPDATER_ENDPOINT }}
        run: npm run release:prepare-updater

      - name: Prepare macOS signing and notarization
        if: needs.release-gates.outputs.channel == 'stable'
        working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run release:prepare-macos-signing

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          APPLE_API_ISSUER: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.APPLE_API_KEY || '' }}
          APPLE_ID: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ needs.release-gates.outputs.release_tag }}
          releaseName: 'Irodori Table ${{ needs.release-gates.outputs.release_tag }}'
          releaseBody: ${{ needs.release-gates.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.release-gates.outputs.prerelease }}
          uploadUpdaterJson: ${{ needs.release-gates.outputs.upload_updater }}
          uploadUpdaterSignatures: ${{ needs.release-gates.outputs.upload_updater }}
          projectPath: apps/desktop
          args: ${{ needs.release-gates.outputs.channel == 'stable' && '--target universal-apple-darwin --bundles dmg,app --config src-tauri/tauri.updater.conf.json' || '--target universal-apple-darwin --bundles dmg,app' }}

  publish-windows:
    name: Publish Windows app
    needs:
      - release-gates
      - publish-macos
    # Still chained after macOS so the two lanes never race uploads to the
    # same GitHub release, but a failed (not cancelled) macOS preview build
    # must not take the unsigned Windows artifacts down with it. Stable keeps
    # the strict all-platform gate.
    if: always() && needs.release-gates.result == 'success' && ((needs.release-gates.outputs.channel == 'preview' && needs.publish-macos.result != 'cancelled') || (needs.release-gates.outputs.channel == 'stable' && needs.publish-macos.result == 'success'))
    runs-on: windows-latest
    steps:
      - name: Checkout irodori-table
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-gates.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> .irodori-local/target'
          key: release-windows

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Prepare stable updater signing config
        if: needs.release-gates.outputs.channel == 'stable'
        working-directory: apps/desktop
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          IRODORI_UPDATER_ENDPOINT: ${{ vars.IRODORI_UPDATER_ENDPOINT }}
        run: npm run release:prepare-updater

      - name: Prepare Windows signing
        if: needs.release-gates.outputs.channel == 'stable'
        working-directory: apps/desktop
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_DIGEST_ALGORITHM: ${{ secrets.WINDOWS_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: npm run release:prepare-windows-signing

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.release-gates.outputs.channel == 'stable' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          tagName: ${{ needs.release-gates.outputs.release_tag }}
          releaseName: 'Irodori Table ${{ needs.release-gates.outputs.release_tag }}'
          releaseBody: ${{ needs.release-gates.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ needs.release-gates.outputs.prerelease }}
          uploadUpdaterJson: ${{ needs.release-gates.outputs.upload_updater }}
          uploadUpdaterSignatures: ${{ needs.release-gates.outputs.upload_updater }}
          projectPath: apps/desktop
          args: ${{ needs.release-gates.outputs.channel == 'stable' && '--bundles nsis,msi --config src-tauri/tauri.updater.conf.json' || '--bundles nsis,msi' }}

  verify-updater:
    name: Verify stable updater manifest
    needs:
      - release-gates
      - publish-windows
    if: needs.release-gates.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    steps:
      - name: Download and validate latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gates.outputs.release_tag }}
        run: |
          gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --pattern latest.json --dir "${RUNNER_TEMP}"
          manifest="${RUNNER_TEMP}/latest.json"
          test "$(jq -r .version "${manifest}")" = "${RELEASE_TAG#v}"
          jq -e '
            (.platforms | keys | any(startswith("linux-"))) and
            (.platforms | keys | any(startswith("darwin-"))) and
            (.platforms | keys | any(startswith("windows-"))) and
            ([.platforms[] | select((.signature | type == "string") and (.signature | length > 0))] | length >= 3) and
            ([.platforms[] | select(.url | startswith("https://"))] | length == (.platforms | length))
          ' "${manifest}"
