name: Security

on:
  pull_request:
    paths:
      - .github/dependabot.yml
      - .github/workflows/security.yml
      - Cargo.lock
      - Cargo.toml
      - apps/**/Cargo.lock
      - apps/**/Cargo.toml
      - apps/**/Dockerfile
      - apps/**/package-lock.json
      - apps/**/package.json
      - crates/**/Cargo.toml
      - scripts/check-licenses.sh
      - scripts/dependency-review.mjs
      - scripts/security-check.sh
      - security/**
  push:
    branches:
      - main
  schedule:
    - cron: "17 20 * * 0"

permissions:
  contents: read

jobs:
  supply-chain:
    name: Supply chain audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # typeship is a sibling path dependency used by the desktop and extension
      # typegen crates. Keep this in sync with the main CI workflow.
      - name: Checkout typeship
        uses: actions/checkout@v7
        with:
          repository: hjosugi/typeship
          path: _typeship

      - name: Position typeship as a sibling
        shell: bash
        run: mv "$GITHUB_WORKSPACE/_typeship" "$GITHUB_WORKSPACE/../typeship"

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - name: Install RustSec cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run supply-chain checks
        env:
          REQUIRE_CARGO_AUDIT: "1"
        run: scripts/security-check.sh
