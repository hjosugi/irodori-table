name: Security

on:
  pull_request:
    paths:
      - .github/dependabot.yml
      - .github/workflows/security.yml
      - Cargo.lock
      - Cargo.toml
      - deny.toml
      - apps/**/Cargo.lock
      - apps/**/Cargo.toml
      - apps/**/Dockerfile
      - apps/**/package-lock.json
      - apps/**/package.json
      - scripts/check-licenses.sh
      - scripts/cargo-deny.sh
      - scripts/dependency-review.mjs
      - scripts/security-check.sh
      - security/**
  push:
    branches:
      - main
  schedule:
    - cron: "17 20 * * 0"

permissions:
  contents: read

jobs:
  supply-chain:
    name: Supply chain audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust security tools
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-deny
          key: rust-security-tools-cargo-audit-latest-cargo-deny-0.19.9-${{ runner.os }}

      - name: Install RustSec cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: command -v cargo-deny || cargo install cargo-deny --locked --version 0.19.9

      - name: Run supply-chain checks
        env:
          REQUIRE_CARGO_AUDIT: "1"
          REQUIRE_CARGO_DENY: "1"
        run: scripts/security-check.sh
