name: irodori-web-endpoint

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: irodori
      POSTGRES_PASSWORD: irodori
      POSTGRES_DB: samples
    volumes:
      - ../../samples/postgres/01_samples.sql:/docker-entrypoint-initdb.d/01_samples.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irodori -d samples"]
      interval: 3s
      timeout: 3s
      retries: 30

  endpoint:
    build:
      context: ./endpoint
    environment:
      DATABASE_URL: postgres://irodori:irodori@postgres:5432/samples
      CORS_ORIGIN: http://localhost:1422
      QUERY_TIMEOUT_MS: 15000
      MAX_ROWS_LIMIT: 1000
    ports:
      - "1423:8787"
    depends_on:
      postgres:
        condition: service_healthy
