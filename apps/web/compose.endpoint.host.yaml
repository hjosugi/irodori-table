name: irodori-web-endpoint-host

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    network_mode: host
    command: ["postgres", "-c", "listen_addresses=127.0.0.1", "-p", "55433"]
    environment:
      POSTGRES_USER: irodori
      POSTGRES_PASSWORD: irodori
      POSTGRES_DB: samples
    volumes:
      - ../../samples/postgres/01_samples.sql:/docker-entrypoint-initdb.d/01_samples.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 55433 -U irodori -d samples"]
      interval: 3s
      timeout: 3s
      retries: 30

  endpoint:
    build:
      context: ./endpoint
    network_mode: host
    environment:
      PORT: 1423
      DATABASE_URL: postgres://irodori:irodori@127.0.0.1:55433/samples
      CORS_ORIGIN: http://localhost:1422
      QUERY_TIMEOUT_MS: 15000
      MAX_ROWS_LIMIT: 1000
    depends_on:
      postgres:
        condition: service_healthy
